name: daily

on:
  schedule:
    # Single entry at 21:30 UTC = 16:30 EST = 17:30 EDT. Always after market
    # close (16:00 ET) regardless of DST. Summer runs land an hour later than
    # ideal, but staying past-close is what matters — never before.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Test run: send email tagged [TEST] but don't commit state"
        required: false
        default: true
        type: boolean

# Never run two pipelines at once — they'd race on the git push back.
concurrency:
  group: trading-pipeline
  cancel-in-progress: false

# Runner needs write access to commit state CSVs back to the repo.
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN for the push; persist-credentials is true by
          # default but we spell it out for clarity.
          persist-credentials: true
          fetch-depth: 1

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # uv reads .python-version (3.12) and installs that interpreter on
      # demand during `uv sync` — no separate actions/setup-python needed.
      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        id: pipeline
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_APP_PASSWORD: ${{ secrets.ALERT_EMAIL_APP_PASSWORD }}
          # When set, email_alert prefixes the subject with [TEST]. The pipeline
          # otherwise runs normally — we just skip the commit step below.
          DRY_RUN: ${{ inputs.dry_run }}
        run: uv run python -m schroeder_trader.main

      # Commit state regardless of pipeline outcome — partial state (e.g. a
      # signal row written before a crash) is still useful and reconciliation
      # on the next run depends on it. Skip on manual dry-run so testing
      # doesn't block the afternoon scheduled run via portfolio idempotency.
      - name: Commit state
        if: always() && inputs.dry_run != true
        run: |
          git config user.name  "schroedertrader-bot"
          git config user.email "bot@schroedertrader.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "chore: state $(date -u +%Y-%m-%d)"
          # Pull-rebase before push in case another workflow raced us.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "$GITHUB_REF_NAME" && git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in 5s"
            sleep 5
          done
          echo "Failed to push state after 3 attempts" >&2
          exit 1
